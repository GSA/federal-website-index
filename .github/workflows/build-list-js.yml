name: Build target url list using TypeScript

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    - cron: "15 20 * * *"

jobs:
  my-job:
    name: Checkout, build, and run indexer application
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: |
          cd builder
          bun install

      - name: Run indexer application
        run: |
          cd builder
          bun src/main.ts

      - name: Sync with remote main
        run: git pull --rebase --autostash origin ${{ github.ref_name }}

      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: Build target url list

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.SITE_SCANNING_ISSUE_REPO_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: 'gsatts-sitescan',
              repo: 'site-scanning',
              title: `Workflow failed: ${context.workflow}`,
              body: `Workflow **${context.workflow}** failed in [${context.repo.owner}/${context.repo.repo}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).\n\nRef: \`${context.ref}\`\nSHA: \`${context.sha}\``
            });
