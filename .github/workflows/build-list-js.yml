name: Build target url list using TypeScript

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    - cron: "15 20 * * *"

jobs:
  my-job:
    name: Checkout, build, and run indexer application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd builder
          bun install

      - name: Run indexer application
        run: |
          cd builder
          bun src/main.ts

      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Build target url list

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SITE_SCANNING_ISSUE_REPO_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: 'gsatts-sitescan',
              repo: 'site-scanning',
              title: `Build failed: ${context.workflow}`,
              body: `Workflow **${context.workflow}** failed in [${context.repo.owner}/${context.repo.repo}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).\n\nRef: \`${context.ref}\`\nSHA: \`${context.sha}\``
            });
