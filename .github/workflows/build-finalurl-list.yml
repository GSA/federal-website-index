name: Build final URL source list

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"

jobs:
  my-job:
    name: Checkout, build, and run final URL list builder
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: |
          cd builder
          bun install

      - name: Run indexer application
        run: |
          cd builder
          bun src/finalUrlBuilder.ts

      - name: Sync with remote main
        run: git pull --rebase --autostash origin ${{ github.ref_name }}

      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: Build final URL list
